<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Lyrics Finder</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS Variables & Theming --- */
        * { box-sizing: border-box; }
        :root { 
            --bg-color: #f4f7f6; 
            --text-main: #2d3436; 
            --text-muted: #636e72; 
            --card-bg: rgba(255, 255, 255, 0.85); 
            --input-bg: #ffffff; 
            --border-color: #dfe6e9; 
            --gradient: linear-gradient(135deg, #6c5ce7, #a29bfe); 
            --danger: #ff7675; 
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
        }
        body.dark-mode { 
            --bg-color: #0f141e; 
            --text-main: #f5f6fa; 
            --text-muted: #a4b0be; 
            --card-bg: rgba(30, 39, 46, 0.7); 
            --input-bg: #1e272e; 
            --border-color: #2f3640; 
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.4); 
        }

        /* --- Base Layout --- */
        body {
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; padding: 20px; 
            height: 100vh; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            transition: background-color 0.4s ease, color 0.4s ease;
            padding-bottom: 80px; /* Pushes the app up so the ad fits! */
        }
        
        .app-wrapper { 
            width: 100%; max-width: 1200px; height: 100%; 
            display: flex; flex-direction: row; gap: 20px; 
        }

        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        h1 { 
            font-size: 2.2rem; margin: 0 0 5px 0; 
            background: var(--gradient); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        /* --- UI Components --- */
        .glass-card { 
            background: var(--card-bg); padding: 30px; border-radius: 24px; 
            box-shadow: var(--shadow); backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        /* Sidebar */
        .search-section { flex: 0 0 400px; display: flex; flex-direction: column; max-height: 100%; } 
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        input { 
            padding: 14px 20px; width: 100%; border: 2px solid var(--border-color); 
            border-radius: 12px; font-size: 15px; background: var(--input-bg); 
            color: var(--text-main); outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: #6c5ce7; }

        /* Buttons */
        .btn { 
            padding: 12px 20px; border: none; border-radius: 12px; 
            font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; 
        }
        .btn-primary { background: var(--gradient); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Lyrics Area */
        #lyrics-container { 
            flex: 1; height: 100%; overflow-y: auto; white-space: pre-wrap; 
            display: none; line-height: 1.8; 
        }
        #lyrics-container::-webkit-scrollbar { width: 8px; }
        #lyrics-container::-webkit-scrollbar-track { background: transparent; }
        #lyrics-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

        /* Settings Gear */
        #settings-btn { 
            position: absolute; top: 20px; right: 20px; background: var(--card-bg); 
            border: 1px solid var(--border-color); font-size: 24px; cursor: pointer; 
            padding: 10px; border-radius: 50%; z-index: 500; transition: transform 0.3s;
        }
        #settings-btn:hover { transform: rotate(90deg); }

        /* Modals */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); 
            justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal-content { 
            background: var(--card-bg); padding: 40px; border-radius: 24px; 
            width: 90%; max-width: 400px; text-align: left; box-shadow: var(--shadow); 
            border: 1px solid var(--border-color); 
        }
        select { background: var(--input-bg); color: var(--text-main); }
        
        /* Floating Button */
        .floating-btn { 
            position: fixed; bottom: 30px; right: 30px; background: var(--danger); 
            color: white; border: none; border-radius: 50px; padding: 15px 25px; 
            font-size: 16px; font-weight: bold; box-shadow: 0 10px 20px rgba(255, 118, 117, 0.4); 
            cursor: pointer; z-index: 100; display: none; transition: transform 0.3s;
        }
        .floating-btn:hover { transform: scale(1.05); }

        /* Responsive */
        @media (max-width: 850px) { 
            .app-wrapper { flex-direction: column; } 
            .search-section { flex: 0 0 auto; width: 100%; } 
        }
    </style>
</head>
<body>

    <button id="settings-btn">⚙️</button>

    <div class="app-wrapper">
        
        <div class="glass-card search-section">
            <div>
                <h1>Pro Lyrics Finder</h1>
                <p style="color: var(--text-muted); margin-bottom: 20px;">Find exact lyrics from the LRCLIB database.</p>

                <div class="input-group">
                    <input type="text" id="artist" placeholder="Artist (e.g., Daft Punk)">
                    <input type="text" id="song" placeholder="Song (e.g., Get Lucky)">
                </div>
                
                <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                    <button class="btn btn-primary" style="flex: 1;" onclick="searchLyrics()">Search</button>
                    <button id="mic-btn" class="btn btn-danger" style="flex: 1;" onclick="startAndroidVoiceSearch()">🎤 Voice Search</button>
                </div>
            </div>

            <div style="margin-top: 30px; border-top: 1px solid var(--border-color); padding-top: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;">
                <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">⭐ Saved Shazams</h3>
                <div id="saved-shazams-list" style="display: flex; flex-direction: column; gap: 10px;">
                    </div>
                
                <div style="margin-top: auto; padding-top: 20px;">
                    <button onclick="generatePlaylistReview()" class="btn btn-primary" style="width: 100%; background: #2d3436; border: 1px solid var(--border-color);">🎲 Review My Taste</button>
                </div>
            </div>
        </div>

        <div id="lyrics-container" class="glass-card"></div>
        
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; border-bottom: 2px solid var(--border-color); padding-bottom: 15px;">Settings</h2>
            
            <div style="margin-bottom: 25px;">
                <button id="theme-toggle" class="btn" style="width: 100%; background: var(--input-bg); color: var(--text-main); border: 2px solid var(--border-color);">🌙 Toggle Dark Mode</button>
            </div>

            <div style="margin-bottom: 30px;">
                <label><strong>Lyrics Text Size:</strong></label><br>
                <select id="font-size-select" style="width: 100%; padding: 14px; margin-top: 10px; border-radius: 12px; border: 2px solid var(--border-color); font-size: 16px;">
                    <option value="14px">Small</option>
                    <option value="16px" selected>Medium</option>
                    <option value="20px">Large</option>
                    <option value="24px">Extra Large</option>
                </select>
            </div>

            <button id="close-settings" class="btn btn-primary" style="width: 100%;">Save & Close</button>
        </div>
    </div>

    <div id="media-modal" class="modal-overlay">
        <div class="modal-content" style="text-align: center;">
            <h2 id="media-title" style="margin-top: 0; border-bottom: 2px solid var(--border-color); padding-bottom: 15px;">Song Media</h2>
            
            <div id="media-content">
                </div>

            <button onclick="document.getElementById('media-modal').style.display='none'" class="btn" style="width: 100%; margin-top: 20px; background: var(--input-bg); color: var(--text-main); border: 2px solid var(--border-color);">Close</button>
        </div>
    </div>

    <div id="review-modal" class="modal-overlay">
        <div class="modal-content" style="text-align: center; max-width: 450px;">
            <h2 id="review-title" style="margin-top: 0; border-bottom: 2px solid var(--border-color); padding-bottom: 15px;">Playlist Review</h2>
            
            <div id="review-content" style="margin-top: 20px; font-size: 15px; line-height: 1.7; color: var(--text-main);">
                </div>

            <button onclick="document.getElementById('review-modal').style.display='none'" class="btn btn-primary" style="width: 100%; margin-top: 25px;">Close Review</button>
        </div>
    </div>
    
    <button id="floating-media-btn" class="floating-btn" onclick="document.getElementById('media-modal').style.display='flex'">
        📺 Watch Video
    </button>

 <script type="module" src="app.js"></script>

</body>
</html>
